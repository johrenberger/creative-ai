name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/lcov-report/
          retention-days: 30

  pages:
    name: Deploy Coverage to GitHub Pages
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage report
        run: npm test

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload coverage artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage/lcov-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets
        run: |
          if command -v gitleaks &> /dev/null; then
            gitleaks detect --source . --verbose
          else
            echo "Gitleaks not installed, skipping secret scan"
          fi
        continue-on-error: true

  build-and-e2e:
    name: Build Application & E2E Tests in Docker
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking for required files..."
          test -f package.json && echo "✓ package.json"
          test -f src/server.js && echo "✓ src/server.js"
          test -f src/cli.js && echo "✓ src/cli.js"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build Docker image (local only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: cti-e2e:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          docker run -d \
            --name cti-e2e \
            -p 3456:3456 \
            -e CTI_DB_PATH=/tmp/cti.db \
            -e CTI_WEBHOOK_SECRET=test-secret \
            cti-e2e:latest

      - name: Wait for container to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3456/health > /dev/null 2>&1; then
              echo "Container is ready"
              exit 0
            fi
            echo "Waiting for container... ($i/30)"
            sleep 1
          done
          echo "Container failed to start"
          docker logs cti-e2e
          exit 1

      - name: Validate health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3456/health)
          if [ "$STATUS" = "200" ]; then
            echo "✓ Health check: $STATUS"
          else
            echo "✗ Health check: $STATUS (expected 200)"
            exit 1
          fi

      - name: Validate stats endpoint
        run: |
          BODY=$(curl -s http://localhost:3456/api/stats)
          echo "$BODY" | grep -q "tasks" && echo "✓ /api/stats returns tasks"
          echo "$BODY" | grep -q "memories" && echo "✓ /api/stats returns memories"
          echo "$BODY" | grep -q "exchanges" && echo "✓ /api/stats returns exchanges"

      - name: Validate all API endpoints
        run: |
          FAILED=0

          echo "=== /api/tasks ==="
          RESP=$(curl -s http://localhost:3456/api/tasks)
          echo "$RESP"
          echo "$RESP" | grep -q "tasks" && echo "✓ /api/tasks" || { echo "✗ /api/tasks FAILED"; FAILED=1; }

          echo ""
          echo "=== /api/context ==="
          RESP=$(curl -s http://localhost:3456/api/context)
          echo "$RESP"
          echo "$RESP" | grep -q "context" && echo "✓ /api/context" || { echo "✗ /api/context FAILED"; FAILED=1; }

          echo ""
          echo "=== /api/memory/recent ==="
          RESP=$(curl -s http://localhost:3456/api/memory/recent)
          echo "$RESP"
          echo "$RESP" | grep -q "recent" && echo "✓ /api/memory/recent" || { echo "✗ /api/memory/recent FAILED"; FAILED=1; }

          echo ""
          echo "=== /api/bridge/exchange ==="
          RESP=$(curl -s http://localhost:3456/api/bridge/exchange)
          echo "$RESP"
          echo "$RESP" | grep -q "exchanges" && echo "✓ /api/bridge/exchange" || { echo "✗ /api/bridge/exchange FAILED"; FAILED=1; }

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "⚠ Some endpoints returned unexpected responses — see above for details"
          fi
          echo ""
          echo "API endpoint validation complete"

      - name: Validate 404 for unknown routes
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3456/api/nonexistent)
          if [ "$STATUS" = "404" ]; then
            echo "✓ 404 handling: $STATUS"
          else
            echo "✗ 404 handling: $STATUS (expected 404)"
            exit 1
          fi

      - name: Validate security headers
        run: |
          HEADERS=$(curl -sI http://localhost:3456/health)
          echo "$HEADERS" | grep -qi "x-frame-options" && echo "✓ X-Frame-Options present"
          echo "$HEADERS" | grep -qi "x-content-type-options" && echo "✓ X-Content-Type-Options present"
          echo "$HEADERS" | grep -qi "strict-transport" && echo "✓ HSTS present"

      - name: Cleanup container
        if: always()
        run: |
          docker stop cti-e2e || true
          docker rm cti-e2e || true

  docker:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image: ghcr.io/${{ github.repository }}/cti:${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.actor }}/cti:${{ github.sha }}
            ghcr.io/${{ github.actor }}/cti:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: [build-and-e2e, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy to Hostinger VPS
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: creative-ai
          docker-compose-path: docker-compose.yml
          environment-variables: |
            CTI_PORT=3456
            CTI_WEBHOOK_SECRET=${{ secrets.CTI_WEBHOOK_SECRET }}