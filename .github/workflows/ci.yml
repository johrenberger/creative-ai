name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets
        run: |
          if command -v gitleaks &> /dev/null; then
            gitleaks detect --source . --verbose
          else
            echo "Gitleaks not installed, skipping secret scan"
          fi
        continue-on-error: true

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking for required files..."
          test -f package.json && echo "✓ package.json"
          test -f src/server.js && echo "✓ src/server.js"
          test -f src/cli.js && echo "✓ src/cli.js"

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: node src/server.js &
        env:
          CTI_DB_PATH: /tmp/cti-test.db

      - name: Wait for server to be ready
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:3456/health > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server... ($i/15)"
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run API tests
        run: |
          curl -s http://localhost:3456/health | grep -q "ok" && echo "✓ Health check passed"
          curl -s http://localhost:3456/api/stats | grep -q "tasks" && echo "✓ Stats endpoint working"

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image: ghcr.io/${{ github.repository }}/cti:${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.actor }}/cti:latest
            ghcr.io/${{ github.actor }}/cti:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Create deployment record
        run: |
          echo "# Deployment Summary" > deployment.md
          echo "Commit: \`${{ github.sha }}\`" >> deployment.md
          echo "Repository: ${{ github.repository }}" >> deployment.md
          echo "Image: ghcr.io/${{ github.actor }}/cti:${{ github.sha }}" >> deployment.md
          echo "Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> deployment.md
          cat deployment.md