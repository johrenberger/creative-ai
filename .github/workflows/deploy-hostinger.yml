name: Build and Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Validate application and compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate Docker Compose file
        run: docker compose -f docker-compose.yml config --quiet

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Run tests
        if: ${{ hashFiles('package.json') != '' }}
        run: npm test --if-present

      - name: Build app
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run build --if-present

  build-docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image-tag: ghcr.io/${{ github.repository_owner }}/creative-ai:${{ github.sha }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Docker Compose app to Hostinger VPS
    runs-on: ubuntu-latest
    needs: build-docker
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy to Hostinger VPS
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: creative-ai
          docker-compose-path: docker-compose.yml
          environment-variables: |
            CTI_PORT=3456
            CTI_WEBHOOK_SECRET=${{ secrets.CTI_WEBHOOK_SECRET }}