services:
  cti:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cti
    restart: unless-stopped
    environment:
      - CTI_PORT=3456
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cti.rule=Host(`cti.${TRAEFIK_HOST}`)"
      - "traefik.http.routers.cti.entrypoints=websecure"
      - "traefik.http.routers.cti.tls.certresolver=letsencrypt"
      - "traefik.http.services.cti.loadbalancer.server.port=3456"
    networks:
      - traefik-jsq2_default

networks:
  traefik-jsq2_default:
    external: true